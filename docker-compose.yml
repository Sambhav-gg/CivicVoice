services:

  postgres:
    image: postgis/postgis:15-3.3
    container_name: civicvoice-postgres
    environment:
      POSTGRES_USER: civicvoice
      POSTGRES_PASSWORD: civicvoice123
      POSTGRES_DB: civicvoice
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U civicvoice" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: civicvoice-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: civicvoice-backend
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://civicvoice:civicvoice123@postgres:5432/civicvoice
      NODE_ENV: production
      JWT_SECRET: mysupersecret.gg
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./civicvoice-client
    container_name: civicvoice-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
